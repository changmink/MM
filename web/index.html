<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Media Server</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <button id="sidebar-toggle" class="sidebar-toggle" type="button"
            aria-label="폴더 메뉴 열기" aria-expanded="false" aria-controls="sidebar">☰</button>
    <h1>Media Server</h1>
    <nav id="breadcrumb"></nav>
    <span id="browse-summary" class="browse-summary"></span>
    <button id="new-folder-btn" class="new-folder-btn">+ 새 폴더</button>
    <button id="url-badge" class="url-badge hidden" type="button" aria-label="진행 중인 URL 가져오기"></button>
    <button id="settings-btn" class="settings-btn" type="button" aria-label="설정">⚙</button>
  </header>

  <div class="app-body">
    <aside id="sidebar" class="sidebar" aria-label="폴더 트리">
      <div id="tree-root" class="tree-empty">로딩 중...</div>
    </aside>

    <main>
      <section id="upload-zone" class="upload-zone">
        <p>파일을 드래그하거나 <label for="file-input" class="upload-label">클릭하여 업로드</label></p>
        <p><button id="url-import-btn" class="link-btn" type="button">URL에서 가져오기</button></p>
        <input type="file" id="file-input" multiple hidden>
        <div id="upload-progress"></div>
      </section>

      <div id="browse-toolbar" class="browse-toolbar">
        <div class="toolbar-types" role="group" aria-label="타입 필터">
          <button type="button" data-type="all" class="type-btn active">전체</button>
          <button type="button" data-type="image" class="type-btn">이미지</button>
          <button type="button" data-type="video" class="type-btn">동영상</button>
          <button type="button" data-type="audio" class="type-btn">음악</button>
          <button type="button" data-type="other" class="type-btn">기타</button>
          <button type="button" data-type="clip" class="type-btn">움짤</button>
        </div>
        <input id="toolbar-search" type="search" placeholder="이름으로 검색" autocomplete="off">
        <select id="toolbar-sort" aria-label="정렬">
          <option value="name:asc">이름 ↑</option>
          <option value="name:desc">이름 ↓</option>
          <option value="size:asc">크기 ↑</option>
          <option value="size:desc">크기 ↓</option>
          <option value="date:asc">수정일 ↑</option>
          <option value="date:desc">수정일 ↓</option>
        </select>
        <label id="select-all-wrap" class="select-all-wrap">
          <input type="checkbox" id="select-all-files">
          <span id="selection-summary">선택 0개</span>
        </label>
        <button id="clear-selection-btn" class="clear-selection-btn" type="button" hidden>선택 해제</button>
        <button id="convert-all-btn" class="convert-all-btn" type="button" hidden></button>
      </div>

      <section id="file-list"></section>
    </main>
  </div>

  <div id="sidebar-backdrop" class="sidebar-backdrop hidden"></div>

  <!-- 라이트박스 -->
  <div id="lightbox" class="lightbox hidden">
    <button class="lb-close" id="lb-close" aria-label="닫기">✕</button>
    <button class="lb-prev" id="lb-prev" aria-label="이전">‹</button>
    <button class="lb-next" id="lb-next" aria-label="다음">›</button>
    <div class="lb-content" id="lb-content"></div>
  </div>

  <!-- 오디오 플레이어 -->
  <div id="audio-player" class="audio-player hidden">
    <div class="audio-info">
      <span id="audio-title">—</span>
    </div>
    <audio id="audio-el" controls></audio>
    <div id="playlist" class="playlist"></div>
  </div>

  <!-- 폴더 생성 모달 -->
  <div id="folder-modal" class="modal-overlay hidden">
    <div class="modal">
      <h3>새 폴더 만들기</h3>
      <input id="folder-name-input" type="text" placeholder="폴더 이름" maxlength="255" autocomplete="off">
      <p id="folder-error" class="modal-error hidden"></p>
      <div class="modal-actions">
        <button id="folder-cancel-btn">취소</button>
        <button id="folder-confirm-btn" class="btn-primary">만들기</button>
      </div>
    </div>
  </div>

  <!-- 이름 변경 모달 -->
  <div id="rename-modal" class="modal-overlay hidden">
    <div class="modal">
      <h3 id="rename-title">이름 변경</h3>
      <p id="rename-hint" class="modal-hint hidden"></p>
      <input id="rename-input" type="text" maxlength="255" autocomplete="off">
      <p id="rename-error" class="modal-error hidden"></p>
      <div class="modal-actions">
        <button id="rename-cancel-btn">취소</button>
        <button id="rename-confirm-btn" class="btn-primary">변경</button>
      </div>
    </div>
  </div>

  <!-- URL import 모달 -->
  <div id="url-modal" class="modal-overlay hidden">
    <div class="modal modal-wide">
      <h3>URL에서 가져오기</h3>
      <p class="modal-hint">한 줄에 하나씩 입력 (최대 50개, 이미지·동영상·음악 · 용량/타임아웃은 ⚙ 설정에서 조정)</p>
      <textarea id="url-input" rows="6" placeholder="https://example.com/clip.mp4" autocomplete="off" spellcheck="false"></textarea>
      <p id="url-error" class="modal-error hidden"></p>
      <div id="url-result" class="url-result hidden">
        <div id="url-rows" class="url-rows"></div>
        <div id="url-summary" class="url-summary hidden"></div>
      </div>
      <div class="modal-actions">
        <button id="url-clear-finished-btn" class="btn-subtle hidden" type="button">완료 항목 모두 지우기</button>
        <span class="modal-actions-spacer"></span>
        <button id="url-cancel-btn">닫기</button>
        <button id="url-confirm-btn" class="btn-primary">가져오기</button>
      </div>
    </div>
  </div>

  <!-- TS → MP4 변환 모달 -->
  <div id="convert-modal" class="modal-overlay hidden">
    <div class="modal modal-wide">
      <h3>TS → MP4 변환</h3>
      <p class="modal-hint">ffmpeg 리먹싱으로 MP4 파일을 만듭니다. 재인코딩은 하지 않습니다.</p>
      <ul id="convert-file-list" class="convert-file-list"></ul>
      <label class="convert-option">
        <input type="checkbox" id="convert-delete-original">
        변환 후 원본 TS 삭제
      </label>
      <p id="convert-error" class="modal-error hidden"></p>
      <div id="convert-result" class="url-result hidden">
        <div id="convert-rows" class="url-rows"></div>
        <div id="convert-summary" class="url-summary hidden"></div>
      </div>
      <div class="modal-actions">
        <button id="convert-cancel-btn">닫기</button>
        <button id="convert-confirm-btn" class="btn-primary">시작</button>
      </div>
    </div>
  </div>

  <!-- 다운로드 설정 모달 -->
  <div id="settings-modal" class="modal-overlay hidden">
    <div class="modal">
      <h3>다운로드 설정</h3>
      <p class="modal-hint">URL에서 가져오기 / HLS 변환에 적용됩니다.</p>
      <label class="settings-field">
        <span class="settings-label">최대 다운로드 크기 (MiB)</span>
        <input id="settings-max-mib" type="number" min="1" max="1048576" step="1" inputmode="numeric">
        <span id="settings-max-hint" class="settings-hint"></span>
      </label>
      <label class="settings-field">
        <span class="settings-label">다운로드 타임아웃 (분)</span>
        <input id="settings-timeout-min" type="number" min="1" max="240" step="1" inputmode="numeric">
      </label>
      <p id="settings-error" class="modal-error hidden"></p>
      <div class="modal-actions">
        <button id="settings-cancel-btn">취소</button>
        <button id="settings-confirm-btn" class="btn-primary">저장</button>
      </div>
    </div>
  </div>

  <script src="/app.js?v=28"></script>
</body>
</html>
