<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Media Server</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <button id="sidebar-toggle" class="sidebar-toggle" type="button"
            aria-label="폴더 메뉴 열기" aria-expanded="false" aria-controls="sidebar">☰</button>
    <h1>Media Server</h1>
    <nav id="breadcrumb"></nav>
    <button id="new-folder-btn" class="new-folder-btn">+ 새 폴더</button>
  </header>

  <div class="app-body">
    <aside id="sidebar" class="sidebar" aria-label="폴더 트리">
      <div id="tree-root" class="tree-empty">로딩 중...</div>
    </aside>

    <main>
      <section id="upload-zone" class="upload-zone">
        <p>파일을 드래그하거나 <label for="file-input" class="upload-label">클릭하여 업로드</label></p>
        <p><button id="url-import-btn" class="link-btn" type="button">URL에서 가져오기</button></p>
        <input type="file" id="file-input" multiple hidden>
        <div id="upload-progress"></div>
      </section>

      <section id="file-list"></section>
    </main>
  </div>

  <div id="sidebar-backdrop" class="sidebar-backdrop hidden"></div>

  <!-- 라이트박스 -->
  <div id="lightbox" class="lightbox hidden">
    <button class="lb-close" id="lb-close" aria-label="닫기">✕</button>
    <button class="lb-prev" id="lb-prev" aria-label="이전">‹</button>
    <button class="lb-next" id="lb-next" aria-label="다음">›</button>
    <div class="lb-content" id="lb-content"></div>
  </div>

  <!-- 오디오 플레이어 -->
  <div id="audio-player" class="audio-player hidden">
    <div class="audio-info">
      <span id="audio-title">—</span>
    </div>
    <audio id="audio-el" controls></audio>
    <div id="playlist" class="playlist"></div>
  </div>

  <!-- 폴더 생성 모달 -->
  <div id="folder-modal" class="modal-overlay hidden">
    <div class="modal">
      <h3>새 폴더 만들기</h3>
      <input id="folder-name-input" type="text" placeholder="폴더 이름" maxlength="255" autocomplete="off">
      <p id="folder-error" class="modal-error hidden"></p>
      <div class="modal-actions">
        <button id="folder-cancel-btn">취소</button>
        <button id="folder-confirm-btn" class="btn-primary">만들기</button>
      </div>
    </div>
  </div>

  <!-- 이름 변경 모달 -->
  <div id="rename-modal" class="modal-overlay hidden">
    <div class="modal">
      <h3 id="rename-title">이름 변경</h3>
      <p id="rename-hint" class="modal-hint hidden"></p>
      <input id="rename-input" type="text" maxlength="255" autocomplete="off">
      <p id="rename-error" class="modal-error hidden"></p>
      <div class="modal-actions">
        <button id="rename-cancel-btn">취소</button>
        <button id="rename-confirm-btn" class="btn-primary">변경</button>
      </div>
    </div>
  </div>

  <!-- URL import 모달 -->
  <div id="url-modal" class="modal-overlay hidden">
    <div class="modal modal-wide">
      <h3>URL에서 가져오기</h3>
      <p class="modal-hint">한 줄에 하나씩 입력 (최대 50개, 2GB/파일 · 이미지·동영상·음악)</p>
      <textarea id="url-input" rows="6" placeholder="https://example.com/clip.mp4" autocomplete="off" spellcheck="false"></textarea>
      <p id="url-error" class="modal-error hidden"></p>
      <div id="url-result" class="url-result hidden">
        <div id="url-rows" class="url-rows"></div>
        <div id="url-summary" class="url-summary hidden"></div>
      </div>
      <div class="modal-actions">
        <button id="url-cancel-btn">닫기</button>
        <button id="url-confirm-btn" class="btn-primary">가져오기</button>
      </div>
    </div>
  </div>

  <script src="/app.js?v=9"></script>
</body>
</html>
